# ============================================================================
# Code and reproducibility
# ============================================================================
github_repo: "https://github.com/Nishanmi/HirePulse-AI.git"

sandbox_link: "https://colab.research.google.com/drive/1aItCz42v1Y3kUW4e6pNwtgr-vBj-hasu?usp=sharing"
# Required. A working hosted environment where the ranker can be run on a small
# candidate sample. See Section 10.5 of submission_spec.md for acceptable
# platforms (HuggingFace Spaces, Streamlit Cloud, Replit, Colab, Docker, Binder).

reproduce_command: "python3 main.py --candidates data/raw/candidates.jsonl.gz --jd data/raw/sample_jd.txt --index-dir indexes --out final_submission.csv"
# The single command that produces submission.csv from candidates.jsonl.
# Should run end-to-end within 5 minutes on CPU with 16GB RAM and no network.

# ============================================================================
# Compute environment
# ============================================================================
compute:
  platform: "Azure VM (Standard D4s v3)"         
  cpu_cores: 4                                   
  ram_gb: 16                                     
  python_version: "3.12.3"                      
  os: "Linux (ubuntu 24.04)"                         
  uses_gpu_for_inference: false                  
  has_network_during_ranking: false              
  pre_computation_required: true                 
  pre_computation_time_minutes: 480              

# ============================================================================
# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Google Antigravity Agent"

ai_usage_summary: |
  Used Google Antigravity Agent for architectural planning, implementing the hybrid retrieval pipeline, parsing models, debugging ONNX offline environments, and generating sandbox datasets. No candidate data was fed to any external LLM.

# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
  HirePulse AI uses a Hybrid Retrieval engine combining BM25 (lexical) and Jina Embeddings v2 (semantic). 
  We extract structured Job Description requirements and rank 100,000 candidates entirely offline on CPU.
  Our final ranking considers multiple independent signals including Role Match, Technical Match, Career Trajectory, and Redrob Validation Signals.

# ============================================================================
# Declarations
# ============================================================================
declarations:
  read_submission_spec: true        # I have read submission_spec.md in full
  code_is_original_work: true       # My code is my team's original work (using AI as a tool is fine)
  no_collusion: true                # I have not coordinated my submission with other teams
  honeypot_check_done: true         # OPTIONAL — set true if you explicitly checked for honeypots in your ranking
  reproduction_tested: true         # I have tested that my reproduce_command runs end-to-end
